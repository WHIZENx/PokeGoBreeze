    <link rel="canonical" id="canonical-url" href="https://poke-go-breeze.vercel.app/" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured data: must be BEFORE the inline script so getElementById('ld-json') resolves -->
    <script id="ld-json" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PokéGo Breeze",
        "url": "https://poke-go-breeze.vercel.app/",
        "description": "Comprehensive Pokémon GO database with stats, moves, counters, PVP rankings, raid guides, and simulation tools.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "inLanguage": "en",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "PokéGoBreeze",
          "logo": {
            "@type": "ImageObject",
            "url": "https://poke-go-breeze.vercel.app/og-image.png"
          }
        }
      }
    </script>

    <script>
      (function () {
        var origin = window.location.origin;
        var imageUrl = origin + '/og-image.png';

        // Update URL-dependent meta tags to reflect actual deployment origin
        document.getElementById('og-url').setAttribute('content', origin + '/');
        document.getElementById('twitter-url').setAttribute('content', origin + '/');
        document.getElementById('canonical-url').setAttribute('href', origin + '/');
        document.getElementById('og-image').setAttribute('content', imageUrl);
        document.getElementById('twitter-image').setAttribute('content', imageUrl);
        document.getElementById('image-src').setAttribute('href', imageUrl);

        // Update JSON-LD structured data with correct absolute URLs
        var ldScript = document.getElementById('ld-json');
        if (ldScript) {
          var ldData = JSON.parse(ldScript.textContent);
          ldData.url = origin + '/';
          ldData.publisher.logo.url = imageUrl;
          ldScript.textContent = JSON.stringify(ldData);
        }

        // Expose SEO helpers for React components to update per-page meta tags
        window.SEO = {
          setKeywords: function (keywords) {
            var content = Array.isArray(keywords) ? keywords.join(', ') : String(keywords);
            document.getElementById('meta-keywords').setAttribute('content', content);
          },
          addKeywords: function (newKeywords) {
            var el = document.getElementById('meta-keywords');
            var current = el.getAttribute('content');
            var added = Array.isArray(newKeywords) ? newKeywords.join(', ') : String(newKeywords);
            el.setAttribute('content', current ? current + ', ' + added : added);
          }
        };
      })();
    </script>

    <title id="page-title">PokéGo Breeze - Pokémon GO Database &amp; Tools</title>
  </head>
