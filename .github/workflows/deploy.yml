name: Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max_old_space_size=4096
  NODE_VERSION: '18.17.0'
  # App env vars (available to all jobs via global env)
  REACT_APP_TOKEN_PRIVATE_REPO: ${{ secrets.REACT_APP_TOKEN_PRIVATE_REPO }}
  REACT_APP_POKEGO_BREEZE_DB_URL: ${{ secrets.REACT_APP_POKEGO_BREEZE_DB_URL }}
  REACT_APP_EDGE_CONFIG: ${{ secrets.REACT_APP_EDGE_CONFIG }}
  REACT_APP_EDGE_ID: ${{ secrets.REACT_APP_EDGE_ID }}
  REACT_APP_EDGE_READ_TOKEN: ${{ secrets.REACT_APP_EDGE_READ_TOKEN }}
  REACT_APP_ENCRYPTION_KEY: ${{ secrets.REACT_APP_ENCRYPTION_KEY }}
  REACT_APP_ENCRYPTION_SALT: ${{ secrets.REACT_APP_ENCRYPTION_SALT }}
  REACT_APP_DEPLOYMENT_MODE: ${{ secrets.REACT_APP_DEPLOYMENT_MODE }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 – Vercel: update Edge Config + trigger deploy hook
  # Branches: main (production) | stage (staging)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-vercel:
    if: |
      github.event_name != 'pull_request' &&
      (github.ref_name == 'main' || github.ref_name == 'stage')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install mongosh
        run: npm install -g mongosh

      - name: Run Edge Config & version update
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
        env:
          VERCEL_TOKEN: ${{ secrets.REACT_APP_EDGE_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.REACT_APP_EDGE_ID }}
          APP_DEPLOYMENT_MODE: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK_URL: ${{ github.ref_name == 'main' && secrets.VERCEL_DEPLOY_HOOK_PRODUCTION || secrets.VERCEL_DEPLOY_HOOK_STAGING }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$DEPLOY_HOOK_URL")
          if [ "$RESPONSE" = "201" ]; then
            echo "✅ Vercel deploy hook triggered (HTTP $RESPONSE)"
          else
            echo "❌ Deploy hook failed (HTTP $RESPONSE)"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 – Firebase Hosting: build & deploy on push
  # Branches: main (production) | stage (staging) | develop (development)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-firebase:
    if: |
      github.event_name != 'pull_request' &&
      (github.ref_name == 'main' || github.ref_name == 'stage' || github.ref_name == 'develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Firebase target
        id: config
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "target=pokego-breeze" ;;
            stage)   echo "target=pokego-breeze-stage" ;;
            develop) echo "target=pokego-breeze-develop" ;;
          esac >> $GITHUB_OUTPUT

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13.35.1

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          npm run prebuild
          bash -c 'source ./config.sh && npx vite build'
          npm run generate:sitemap

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy \
            --only hosting:${{ steps.config.outputs.target }} \
            --non-interactive \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            -m "Branch: ${{ github.ref_name }} | RunID: ${{ github.run_id }} | SHA: ${{ github.sha }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.ref_name }}-${{ github.sha }}
          path: dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 – Firebase Hosting: PR preview
  # ─────────────────────────────────────────────────────────────────────────────
  firebase-pr-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run prebuild
          bash -c 'source ./config.sh && npx vite build'

      - name: Deploy PR Preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_POKEGO_BREEZE }}'
          projectId: pokego-breeze
          firebaseToolsVersion: '13.35.1'
